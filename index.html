<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        /* Reset total para evitar espacios en blanco */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #07070D;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Evita que el brillo cree barras de scroll */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Instrument Sans', sans-serif;
        }

        /* Contenedor principal que imita tu Frame de Figma */
        .canvas {
            position: relative;
            width: 100%;
            max-width: 1440px; /* Ancho de tu diseño */
            height: 1024px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* El Texto: Usamos valores exactos de tu diseño */
        .texto-principal {
            position: relative;
            z-index: 10;
            width: 973px;
            text-align: center;
            color: #FF8C00;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.2;
            text-transform: uppercase;
        }

        /* El Brillo: Recreación exacta del degradado de Figma */
        .glow {
            position: absolute;
            /* Posicionamiento exacto basado en tu código */
            width: 1827px;
            height: 1827px;
            left: 50%; /* Centramos el origen */
            top: 40%; 
            transform: translate(-10%, -50%); /* Ajuste para que quede a la derecha como en tu diseño */
            z-index: 1;
            background: radial-gradient(
                50% 50% at 50% 50%, 
                rgba(255, 8, 0, 0.36) 0%, 
                rgba(255, 91, 0, 0.18) 20%, 
                rgba(255, 46, 0, 0.09) 49%, 
                rgba(255, 0, 0, 0) 100%
            );
            pointer-events: none;
        }

        /* Ajuste para tu pantalla de 1280x800 */
        @media (max-width: 1300px) {
            .texto-principal {
                font-size: 36px;
                width: 80%;
            }
        }
    </style>
</head>
<body>

    <div class="canvas">
        <div class="texto-principal">
            MÁS DE {nmb_info} INFORMACIÓN DE USUARIOS EN<br/>NUESTRA BASE DE DATOS.
        </div>
        
        <div class="glow"></div>
    </div>

</body>
</html>
