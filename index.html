<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700&display=swap" rel="stylesheet">
    
    <style>
        /* Eliminamos margenes por defecto */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #07070D;
            overflow-x: hidden; /* Evita el scroll horizontal */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Instrument Sans', sans-serif;
        }

        /* Contenedor Principal (Tu Frame de Figma) */
        .main-container {
            width: 100vw;
            height: 100vh;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* El texto central */
        .hero-text {
            width: 90%; /* Se ajusta al ancho de la pantalla */
            max-width: 973px;
            z-index: 2; /* Para que esté por encima del brillo */
            text-align: center;
            color: #FF8C00;
            font-size: clamp(24px, 5vw, 48px); /* Tamaño de fuente responsivo */
            font-weight: 700;
            line-height: 1.2;
        }

        /* El efecto de brillo (Radial Gradient) */
        .glow-effect {
            position: absolute;
            width: 150vmax; /* Tamaño dinámico basado en la pantalla */
            height: 150vmax;
            top: -50%;
            right: -50%;
            z-index: 1;
            background: radial-gradient(
                ellipse 50% 50% at 50% 50%, 
                rgba(255, 8, 5, 0.2) 0%, 
                rgba(255, 91, 0, 0.1) 20%, 
                rgba(255, 46, 0, 0.05) 50%, 
                rgba(255, 0, 0, 0) 100%
            );
            pointer-events: none; /* No interfiere con clics */
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="hero-text">
            MÁS DE {nmb_info} INFORMACIÓN DE USUARIOS EN<br/>NUESTRA BASE DE DATOS.
        </div>

        <div class="glow-effect"></div>
    </div>

</body>
</html>
