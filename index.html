<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base de Datos - Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #07070D;
            width: 100vw;
            height: 100vh;
            overflow: hidden; /* Evita que el brillo gigante cree scrollbars */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Instrument Sans', sans-serif;
        }

        /* Contenedor de la luz de fondo */
        .background-glow {
            position: absolute;
            width: 2230px;
            height: 2230px;
            /* Lo posicionamos para que la luz venga desde el centro-derecha */
            right: -500px; 
            top: -500px;
            z-index: 1;
            background: radial-gradient(
                ellipse 50% 50% at 50% 50%, 
                rgba(255, 8, 0, 0.39) 0%, 
                rgba(255, 91, 0, 0.25) 0%, 
                rgba(255, 46, 0, 0.09) 49%, 
                rgba(255, 0, 0, 0) 100%
            );
            pointer-events: none; /* Para que no interfiera con clics */
        }

        /* Contenedor del contenido */
        .content {
            position: relative;
            z-index: 10; /* Por encima de la luz */
            text-align: center;
            padding: 20px;
        }

        .texto-principal {
            color: #FF8C00;
            font-size: 48px;
            font-weight: 700;
            line-height: 1.1;
            max-width: 900px;
            text-transform: uppercase;
        }

        /* Ajuste para tu pantalla 1280x800 */
        @media (max-width: 1300px) {
            .texto-principal {
                font-size: 38px;
            }
        }
    </style>
</head>
<body>

    <div class="background-glow"></div>

    <div class="content">
        <h1 class="texto-principal">
            MÁS DE {nmb_info} INFORMACIÓN DE USUARIOS EN<br/>NUESTRA BASE DE DATOS.
        </h1>
    </div>

</body>
</html>
